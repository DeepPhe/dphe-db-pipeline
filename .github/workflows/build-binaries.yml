name: build unsigned binaries

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DIST_REPO: DeepPhe/DeepPhe-Dist
  PACKAGE_NAME: dphe-db-pipeline

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: dphe-pipeline-linux-x86_64
            built-file: dist/dphe-pipeline
            artifact-file: dist/dphe-pipeline-linux-x86_64
          - os: windows-2022
            artifact: dphe-pipeline-windows-x86_64
            built-file: dist/dphe-pipeline.exe
            artifact-file: dist/dphe-pipeline-windows-x86_64.exe
          - os: macos-15
            artifact: dphe-pipeline-macos-arm64
            built-file: dist/dphe-pipeline
            artifact-file: dist/dphe-pipeline-macos-arm64
          - os: macos-15-intel
            artifact: dphe-pipeline-macos-x86_64
            built-file: dist/dphe-pipeline
            artifact-file: dist/dphe-pipeline-macos-x86_64

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install binary-build dependencies
        run: uv sync --frozen --group binary --extra mysql

      - name: Build one-file executable
        run: uv run pyinstaller --clean --noconfirm packaging/dphe-pipeline.spec

      - name: Smoke-test frozen executable
        run: uv run python packaging/smoke_test.py "${{ matrix.built-file }}"

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: mv "${{ matrix.built-file }}" "dist/${{ matrix.artifact }}"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item "${{ matrix.built-file }}" "dist/${{ matrix.artifact }}.exe"

      - name: Upload unsigned executable
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-unsigned
          path: ${{ matrix.artifact-file }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  publish:
    name: Publish unsigned DeepPhe-Dist release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download unsigned executables
        uses: actions/download-artifact@v8
        with:
          pattern: dphe-pipeline-*-unsigned
          path: dist
          merge-multiple: true

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"

          {
            echo "title=${PACKAGE_NAME} v${version}"
            echo "notes<<EOF"
            echo "Unsigned test binaries built from ${GITHUB_REPOSITORY}@${GITHUB_SHA}."
            echo
            echo "These assets have not received production code signing or macOS notarization."
            echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify release assets
        shell: bash
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f -print | sort)

          if [ "${#assets[@]}" -ne 4 ]; then
            echo "::error title=Unexpected build artifacts::Expected 4 executables, found ${#assets[@]}."
            printf '%s\n' "${assets[@]}"
            exit 1
          fi

          printf 'Unsigned release assets:\n'
          printf '%s\n' "${assets[@]}"

      - name: Create or update DeepPhe-Dist release
        env:
          GH_TOKEN: ${{ secrets.DEEPHE_DIST_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ env.DPHE_VERSION }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          RELEASE_NOTES: ${{ steps.release.outputs.notes }}
        shell: bash
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error title=Missing release token::Add a DEEPHE_DIST_RELEASE_TOKEN secret with contents:write access to ${DIST_REPO}."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$DIST_REPO" > /dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$DIST_REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          else
            gh release create "$RELEASE_TAG" \
              --repo "$DIST_REPO" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.DEEPHE_DIST_RELEASE_TOKEN }}
          RELEASE_TAG: ${{ env.DPHE_VERSION }}
        shell: bash
        run: |
          mapfile -t assets < <(find dist -maxdepth 1 -type f -print | sort)
          gh release upload "$RELEASE_TAG" "${assets[@]}" \
            --repo "$DIST_REPO" \
            --clobber
