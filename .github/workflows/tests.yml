name: tests

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Verify install + tests on every supported OS ...
        os: [ubuntu-latest, windows-latest, macos-latest]
        # ... across the supported floor (3.12) and the dev pin (3.13).
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

      # Confirms the install is usable end to end on this OS: the
      # `dphe-pipeline` console script resolves, the bundled example data is
      # packaged, and a default 3-stage run completes.
      - name: Smoke-test the installed CLI
        run: uv run dphe-pipeline

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check src/dphe_db_pipeline tests

      - name: Mypy
        run: uv run mypy src/dphe_db_pipeline
